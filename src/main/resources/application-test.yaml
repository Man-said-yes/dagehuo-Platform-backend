server:
  port: 8080

spring:
  application:
    name: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:dagehuo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 微信小程序配置
wechat:
  app-id: your_app_id_here
  app-secret: your_app_secret_here
  test-mode: true  # 测试模式：true-使用code作为openid，false-调用真实微信接口

# JWT配置
jwt:
  secret: dagehuo-platform-secret-key-2024
  expiration: 31536000000