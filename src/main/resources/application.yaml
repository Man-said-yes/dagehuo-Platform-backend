server:
  port: 8080

spring:

  application:
    name: test
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dagehuo
    username: root
    password: 123456
  # 配置Spring Boot自动执行SQL脚本
  sql:
    init:
      mode: never
      schema-locations: classpath:sql/init.sql
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 微信小程序配置
wechat:
  app-id: your_app_id_here
  app-secret: your_app_secret_here
  test-mode: true  # 测试模式：true-使用code作为openid，false-调用真实微信接口

# JWT配置
jwt:
  secret: dagehuo-platform-secret-key-2024
  expiration: 31536000000

# 阿里云OSS配置
ali yun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com  # 替换为你的Bucket地域节点（控制台Bucket概览可查）
    accessKeyId: your_access_key_id_here           # 替换为实际值
    accessKeySecret: your_access_key_secret_here  # 替换为实际值
    bucketName: your_bucket_name_here             # 替换为你创建的Bucket名称

# AI API配置
