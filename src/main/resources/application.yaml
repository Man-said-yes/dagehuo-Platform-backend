server:
  port: 8080

spring:
  application:
    name: test
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dagehuo
    username: root
    password: 123456
  # 配置Spring Boot自动执行SQL脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 微信小程序配置
wechat:
  app-id: your_app_id_here
  app-secret: your_app_secret_here

# JWT配置
jwt:
  secret: dagehuo-platform-secret-key-2024
  expiration: 86400000
